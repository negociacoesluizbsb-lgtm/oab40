  <desc id="desc">Icone com o numero 40 em destaque sobre fundo escuro.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1220" />
